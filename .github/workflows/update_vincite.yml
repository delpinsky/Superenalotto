name: Aggiorna Database Vincite SuperEnalotto

on:
  workflow_dispatch:
  # Dopo ogni aggiornamento estrazioni
  workflow_run:
    workflows: ["Aggiorna Database SuperEnalotto"]
    types: [completed]
  # Schedule settimanale sabato alle 21:30 UTC
  schedule:
    - cron: '30 21 * * 6'

jobs:
  # ── FASE 1: 6 job paralleli, ognuno su un range di 5 anni ────────────────
  scrape:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false   # se un job fallisce, gli altri continuano
      matrix:
        years:
          - "1997-2001"
          - "2002-2006"
          - "2007-2011"
          - "2012-2016"
          - "2017-2021"
          - "2022-2026"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scraping vincite ${{ matrix.years }}
        run: python update_vincite.py --years ${{ matrix.years }}

      - name: Upload file parziale
        uses: actions/upload-artifact@v4
        with:
          name: vincite-${{ matrix.years }}
          path: vincite_${{ matrix.years }}.json
          retention-days: 1

  # ── FASE 2: merge di tutti i file parziali in vincite.json ───────────────
  merge:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download tutti i file parziali
        uses: actions/download-artifact@v4
        with:
          pattern: vincite-*
          merge-multiple: true

      - name: Merge in vincite.json
        run: python update_vincite.py --merge

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vincite.json
          git diff --cached --quiet || git commit -m "Aggiornamento vincite concorsi [skip ci]"
          git push
