name: Fix P6 Database Vincite

on:
  workflow_dispatch:  # solo manuale

jobs:
  fix-p6:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        years:
          - "1997-2001"
          - "2002-2006"
          - "2007-2011"
          - "2012-2016"
          - "2017-2021"
          - "2022-2026"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix p6 per anni ${{ matrix.years }}
        run: python update_vincite.py --years ${{ matrix.years }} --fix-p6

      - name: Upload file parziale
        uses: actions/upload-artifact@v4
        with:
          name: vincite-fix-${{ matrix.years }}
          path: vincite_${{ matrix.years }}.json
          retention-days: 1

  merge:
    needs: fix-p6
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download file parziali
        uses: actions/download-artifact@v4
        with:
          pattern: vincite-fix-*
          merge-multiple: true

      - name: Merge in vincite.json
        run: python update_vincite.py --merge

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vincite.json
          git diff --cached --quiet || git commit -m "Fix p6 database vincite [skip ci]"
          git push
