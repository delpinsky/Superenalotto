name: Aggiorna Database Vincite SuperEnalotto

on:
  workflow_dispatch:
    inputs:
      retry_empty:
        description: 'Riprova le date con {} (true/false)'
        required: false
        default: 'false'
  workflow_run:
    workflows: ["Aggiorna Database SuperEnalotto"]
    types: [completed]
  schedule:
    - cron: '0 22 * * 6'

jobs:
  # ── FASE 1: 6 job paralleli ───────────────────────────────────────────────
  scrape:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { from: "1997", to: "2001" }
          - { from: "2002", to: "2006" }
          - { from: "2007", to: "2011" }
          - { from: "2012", to: "2016" }
          - { from: "2017", to: "2021" }
          - { from: "2022", to: "2026" }
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepara vincite parziale ${{ matrix.from }}-${{ matrix.to }}
        run: |
          python3 - << 'EOF'
          import json, os
          from_y, to_y = '${{ matrix.from }}', '${{ matrix.to }}'
          vincite_all = {}
          if os.path.exists('vincite.json'):
              with open('vincite.json') as f:
                  vincite_all = json.load(f).get('vincite', {})
          # Estrai solo le date del range
          subset = {k: v for k, v in vincite_all.items() if from_y <= k[:4] <= to_y}
          with open('vincite.json', 'w') as f:
              json.dump({'version':1,'updated':'','count':0,'vincite':subset}, f)
          print(f'Range {from_y}-{to_y}: {len(subset)} quote esistenti')
          EOF

      - name: Scraping vincite ${{ matrix.from }}-${{ matrix.to }}
        run: |
          ARGS="--from-year ${{ matrix.from }} --to-year ${{ matrix.to }}"
          if [ "${{ github.event.inputs.retry_empty }}" = "true" ]; then
            ARGS="$ARGS --retry-empty"
          fi
          python update_vincite.py $ARGS

      - name: Rinomina output parziale
        run: mv vincite.json vincite_${{ matrix.from }}-${{ matrix.to }}.json

      - name: Upload file parziale
        uses: actions/upload-artifact@v4
        with:
          name: vincite-${{ matrix.from }}-${{ matrix.to }}
          path: vincite_${{ matrix.from }}-${{ matrix.to }}.json
          retention-days: 1

  # ── FASE 2: merge ────────────────────────────────────────────────────────
  merge:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download tutti i file parziali
        uses: actions/download-artifact@v4
        with:
          pattern: vincite-*
          merge-multiple: true

      - name: Merge in vincite.json
        run: |
          python3 - << 'EOF'
          import json, glob, os
          from datetime import datetime

          # Parti dal vincite.json esistente nel repo
          all_vincite = {}
          if os.path.exists('vincite.json'):
              with open('vincite.json') as f:
                  all_vincite = json.load(f).get('vincite', {})
              print(f'Base: {len(all_vincite)} entries')

          # Merge i file parziali (sovrascrivono il base per il loro range)
          for fn in sorted(glob.glob('vincite_*-*.json')):
              with open(fn) as f:
                  partial = json.load(f).get('vincite', {})
              all_vincite.update(partial)
              print(f'Merge {fn}: {len(partial)} entries')
              os.remove(fn)

          valid = len([v for v in all_vincite.values() if v and v != {}])
          out = {
              'version': 1,
              'updated': datetime.utcnow().isoformat() + 'Z',
              'count': valid,
              'vincite': dict(sorted(all_vincite.items()))
          }
          with open('vincite.json', 'w') as f:
              json.dump(out, f, separators=(',',':'), ensure_ascii=False)
          print(f'Salvato: {valid} quote valide su {len(all_vincite)} totali')
          EOF

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vincite.json
          git diff --cached --quiet || git commit -m "Aggiornamento vincite concorsi [skip ci]"
          git push
