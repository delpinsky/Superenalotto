name: Aggiorna Database Vincite SuperEnalotto

on:
  # Esegui dopo il workflow principale (che aggiorna le estrazioni)
  workflow_run:
    workflows: ["Aggiorna Database SuperEnalotto"]
    types: [completed]
  # Oppure manualmente
  workflow_dispatch:
  # Schedule di sicurezza: ogni martedì, giovedì, venerdì, sabato alle 21:00 UTC (23:00 IT)
  schedule:
    - cron: '0 21 * * 2,4,5,6'

jobs:
  update-vincite:
    runs-on: ubuntu-latest
    # Esegui solo se il workflow principale è andato a buon fine (o se manuale/schedule)
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui scraping vincite
        run: python update_vincite.py

      - name: Commit e push vincite.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vincite.json
          # Commit solo se il file è cambiato
          git diff --cached --quiet || git commit -m "Aggiornamento vincite concorsi [skip ci]"
          git push
