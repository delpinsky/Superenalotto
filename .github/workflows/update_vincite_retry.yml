name: Retry Anno Vincite SuperEnalotto

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Anno da riprocessare (es. 2026)'
        required: true
        default: '2026'

jobs:
  retry-year:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Retry scraping vincite anno ${{ github.event.inputs.year }}
        run: python update_vincite.py --retry-year ${{ github.event.inputs.year }}

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vincite.json
          git diff --cached --quiet || git commit -m "Retry vincite anno ${{ github.event.inputs.year }} [skip ci]"
          git push
