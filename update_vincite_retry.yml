name: Retry Vincite Mancanti

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { from: "1997", to: "2001" }
          - { from: "2002", to: "2006" }
          - { from: "2007", to: "2011" }
          - { from: "2012", to: "2016" }
          - { from: "2017", to: "2021" }
          - { from: "2022", to: "2026" }
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepara subset ${{ matrix.from }}-${{ matrix.to }}
        run: |
          python3 - << 'EOF'
          import json, os
          from_y, to_y = '${{ matrix.from }}', '${{ matrix.to }}'
          vincite_all = {}
          if os.path.exists('vincite.json'):
              with open('vincite.json') as f:
                  vincite_all = json.load(f).get('vincite', {})
          subset = {k: v for k, v in vincite_all.items() if from_y <= k[:4] <= to_y}
          with open('vincite.json', 'w') as f:
              json.dump({'version':1,'updated':'','count':0,'vincite':subset}, f)
          empty = len([v for v in subset.values() if v == {}])
          print(f'Range {from_y}-{to_y}: {len(subset)} entries, {empty} da ritentare')
          EOF

      - name: Retry empty ${{ matrix.from }}-${{ matrix.to }}
        run: |
          python update_vincite.py \
            --from-year ${{ matrix.from }} \
            --to-year ${{ matrix.to }} \
            --retry-empty --aggressive

      - name: Rinomina output
        run: mv vincite.json vincite_${{ matrix.from }}-${{ matrix.to }}.json

      - uses: actions/upload-artifact@v4
        with:
          name: vincite-${{ matrix.from }}-${{ matrix.to }}
          path: vincite_${{ matrix.from }}-${{ matrix.to }}.json
          retention-days: 1

  merge:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/download-artifact@v4
        with:
          pattern: vincite-*
          merge-multiple: true

      - name: Merge
        run: |
          python3 - << 'EOF'
          import json, glob, os
          from datetime import datetime
          all_vincite = {}
          if os.path.exists('vincite.json'):
              with open('vincite.json') as f:
                  all_vincite = json.load(f).get('vincite', {})
          for fn in sorted(glob.glob('vincite_*-*.json')):
              with open(fn) as f:
                  partial = json.load(f).get('vincite', {})
              all_vincite.update(partial)
              print(f'Merge {fn}: {len(partial)} entries')
              os.remove(fn)
          valid = len([v for v in all_vincite.values() if v and v != {}])
          out = {'version':1,'updated':datetime.utcnow().isoformat()+'Z',
                 'count':valid,'vincite':dict(sorted(all_vincite.items()))}
          with open('vincite.json','w') as f:
              json.dump(out, f, separators=(',',':'), ensure_ascii=False)
          print(f'Salvato: {valid} quote valide su {len(all_vincite)} totali')
          EOF

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vincite.json
          git diff --cached --quiet || git commit -m "Retry vincite mancanti [skip ci]"
          git push
